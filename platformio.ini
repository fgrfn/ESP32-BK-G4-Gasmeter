[platformio]
default_envs = esp32dev

[common]
extra_scripts =
    pre:scripts/version.py
lib_deps =
    knolleary/PubSubClient @ 2.8
    bblanchon/ArduinoJson @ 7.4.2
    ESP32Async/AsyncTCP @ 3.4.10
    ESP32Async/ESPAsyncWebServer @ 3.11.2
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -Wall
    -Wextra
    -Werror=return-type

[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota

; Feste IP des Gaszähler-ESP32 eintragen
upload_port = 10.10.XX.XX

upload_flags =
    --port=3232
    --auth=${sysenv.GASMETER_OTA_PASSWORD}

[env:esp32dev]
platform = espressif32 @ 6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags = ${common.build_flags}
board_build.partitions = default.csv
upload_speed = 921600
check_skip_packages = yes
check_flags =
    cppcheck: --suppress=preprocessorErrorDirective

[env:esp32dev-debug]
extends = env:esp32dev
build_type = debug
build_flags =
    ${common.build_flags}
    -D CORE_DEBUG_LEVEL=4

[env:esp32-s3-devkitc-1]
platform = espressif32 @ 6.10.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
build_flags =
    ${common.build_flags}
    -D GAS_MBUS_RX_PIN=18
    -D GAS_MBUS_TX_PIN=17
    -D GAS_STATUS_LED_PIN=2
    -D GAS_RESET_BUTTON_PIN=0
board_build.partitions = default.csv
upload_speed = 921600
check_skip_packages = yes
check_flags =
    cppcheck: --suppress=preprocessorErrorDirective

[env:native]
platform = native
test_build_src = no
extra_scripts = ${common.extra_scripts}
