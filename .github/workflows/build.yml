name: Build and test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: pio test -e native
      - name: Replay captured M-Bus telegram
        run: python tools/replay_mbus.py test/fixtures/bk_g4_synthetic.hex --expect 123.456

  firmware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [esp32dev, esp32dev-debug, esp32-s3-devkitc-1]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - name: Build ${{ matrix.environment }}
        shell: bash
        run: |
          set -o pipefail
          pio run -e ${{ matrix.environment }} 2>&1 | tee build.log
      - name: Report compiler failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('build.log') ? fs.readFileSync('build.log', 'utf8') : 'No build log was produced.';
            const tail = log.split('\n').slice(-140).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CI compiler failure: \`${{ matrix.environment }}\`\n\n\`\`\`text\n${tail}\n\`\`\``
            });
      - name: Enforce application size limit
        if: matrix.environment == 'esp32dev'
        run: |
          size=$(stat -c%s .pio/build/esp32dev/firmware.bin)
          echo "firmware.bin: ${size} bytes"
          test "$size" -le 1300000
      - uses: actions/upload-artifact@v7
        if: matrix.environment == 'esp32dev'
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
          retention-days: 14

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - name: Run static analysis
        shell: bash
        run: |
          set -o pipefail
          pio check -e esp32dev --fail-on-defect high 2>&1 | tee check.log
      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-${{ github.sha }}
          path: check.log
          retention-days: 7
      - name: Report analysis failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('check.log') ? fs.readFileSync('check.log', 'utf8') : 'No analysis log was produced.';
            const tail = log.split('\n').slice(-140).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CI static-analysis failure\n\n\`\`\`text\n${tail}\n\`\`\``
            });
