name: Build and test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: pio test -e native

  firmware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [esp32dev, esp32dev-debug]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}
      - name: Enforce application size limit
        if: matrix.environment == 'esp32dev'
        run: |
          size=$(stat -c%s .pio/build/esp32dev/firmware.bin)
          echo "firmware.bin: ${size} bytes"
          test "$size" -le 1300000
      - uses: actions/upload-artifact@v4
        if: matrix.environment == 'esp32dev'
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/esp32dev/firmware.bin
            .pio/build/esp32dev/bootloader.bin
            .pio/build/esp32dev/partitions.bin
          retention-days: 14

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: pio check -e esp32dev --fail-on-defect high
