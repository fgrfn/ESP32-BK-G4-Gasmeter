name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic firmware version (for example 2.1.3 or v2.1.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ESP_SIGNING_KEY: ${{ secrets.ESP_SIGNING_KEY }}
      GASMETER_VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate release version
        id: release_version
        shell: bash
        run: |
          GASMETER_VERSION="${GASMETER_VERSION#v}"
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases must be started from the main branch" >&2
            exit 1
          fi
          if [[ ! "$GASMETER_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Version must be an exact semantic version such as 3.2.0" >&2
            exit 1
          fi
          if git show-ref --verify --quiet "refs/tags/v${GASMETER_VERSION}"; then
            echo "Tag v${GASMETER_VERSION} already exists" >&2
            exit 1
          fi
          if ! grep -Eq "^## ${GASMETER_VERSION}([[:space:]]|$)" CHANGELOG.md; then
            echo "CHANGELOG.md has no section for ${GASMETER_VERSION}" >&2
            exit 1
          fi
          latest_tag=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)
          if [[ -n "$latest_tag" ]]; then
            latest_version=${latest_tag#v}
            if [[ ! "$latest_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "Latest release tag ${latest_tag} is not a supported semantic version" >&2
              exit 1
            fi
            IFS=. read -r latest_major latest_minor latest_patch <<< "$latest_version"
            IFS=. read -r release_major release_minor release_patch <<< "$GASMETER_VERSION"
            if (( release_major < latest_major ||
                  (release_major == latest_major && release_minor < latest_minor) ||
                  (release_major == latest_major && release_minor == latest_minor && release_patch <= latest_patch) )); then
              echo "Version ${GASMETER_VERSION} must be newer than latest release ${latest_version}" >&2
              exit 1
            fi
          fi
          echo "GASMETER_VERSION=${GASMETER_VERSION}" >> "$GITHUB_ENV"
          echo "version=${GASMETER_VERSION}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: pio test -e native
      - run: pio run -e esp32dev
      - name: Verify embedded firmware version
        shell: bash
        run: strings .pio/build/esp32dev/firmware.bin | grep -Fx "ESP32 Gas Meter firmware ${GASMETER_VERSION}"
      - name: Create release images
        shell: bash
        run: |
          mkdir -p release
          cp .pio/build/esp32dev/firmware.bin "release/ESP32-BK-G4-Gasmeter-${GASMETER_VERSION}-ota.bin"
          python -m esptool --chip esp32 merge_bin -o "release/ESP32-BK-G4-Gasmeter-${GASMETER_VERSION}-factory.bin" \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/esp32dev/firmware.bin
      - name: Optionally sign OTA image for Secure Boot V2
        if: env.ESP_SIGNING_KEY != ''
        shell: bash
        run: |
          printf '%s' "$ESP_SIGNING_KEY" > /tmp/secure-boot-signing-key.pem
          python -m espsecure sign_data --version 2 --keyfile /tmp/secure-boot-signing-key.pem \
            --output "release/ESP32-BK-G4-Gasmeter-${GASMETER_VERSION}-ota-signed.bin" \
            "release/ESP32-BK-G4-Gasmeter-${GASMETER_VERSION}-ota.bin"
          rm -f /tmp/secure-boot-signing-key.pem
      - name: Create checksums
        shell: bash
        run: sha256sum release/*.bin > release/SHA256SUMS
      - name: Publish release and version tag
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release_version.outputs.version }}
          name: Release v${{ steps.release_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release/*
