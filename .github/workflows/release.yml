name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ESP_SIGNING_KEY: ${{ secrets.ESP_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install "platformio==6.1.18"
      - name: Verify tag and source version
        shell: bash
        run: |
          source_version=$(sed -n 's/^#define FIRMWARE_VERSION "\([^"]*\)"/\1/p' include/version.h)
          tag_version=${GITHUB_REF_NAME#v}
          test -n "$source_version"
          test "$source_version" = "$tag_version"
      - run: pio test -e native
      - run: pio run -e esp32dev
      - name: Create release images
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          mkdir -p release
          cp .pio/build/esp32dev/firmware.bin "release/ESP32-BK-G4-Gasmeter-${version}-ota.bin"
          python -m esptool --chip esp32 merge_bin -o "release/ESP32-BK-G4-Gasmeter-${version}-factory.bin" \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/esp32dev/firmware.bin
          sha256sum release/*.bin > release/SHA256SUMS
      - name: Optionally sign OTA image for Secure Boot V2
        if: env.ESP_SIGNING_KEY != ''
        shell: bash
        run: |
          printf '%s' "$ESP_SIGNING_KEY" > /tmp/secure-boot-signing-key.pem
          version=${GITHUB_REF_NAME#v}
          python -m espsecure sign_data --version 2 --keyfile /tmp/secure-boot-signing-key.pem \
            --output "release/ESP32-BK-G4-Gasmeter-${version}-ota-signed.bin" \
            "release/ESP32-BK-G4-Gasmeter-${version}-ota.bin"
          sha256sum "release/ESP32-BK-G4-Gasmeter-${version}-ota-signed.bin" >> release/SHA256SUMS
          rm -f /tmp/secure-boot-signing-key.pem
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
