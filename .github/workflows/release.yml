name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger bei Tags wie v1.0.0, v1.2.3, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        
    - name: Update version in code
      run: |
        sed -i 's/const char\* FIRMWARE_VERSION = ".*";/const char* FIRMWARE_VERSION = "${{ steps.get_version.outputs.VERSION }}";/' src/main.cpp
        
    - name: Build firmware
      run: pio run
      
    - name: Rename firmware binary
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
        body: |
          ## Release ${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          Flash die Firmware mit:
          ```bash
          esptool.py --port /dev/ttyUSB0 write_flash 0x10000 BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
          ```
          
          Oder nutze OTA-Updates über die Web-Oberfläche.
          
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
