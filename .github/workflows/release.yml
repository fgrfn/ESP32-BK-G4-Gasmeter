name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Extract version from code
      id: get_version
      run: |
      if: steps.check_tag.outputs.exists == 'false'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache PlatformIO
      if: steps.check_tag.outputs.exists == 'false'
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-
        
    - name: Install PlatformIO
      if: steps.check_tag.outputs.exists == 'false'
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        
    - name: Build firmware
      if: steps.check_tag.outputs.exists == 'false'
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
      if: steps.check_tag.outputs.exists == 'false'
      run: |
        mkdir -p release
        cp .pio/build/esp32dev/firmware.bin release/BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
    
    - name: Create tag
      if: steps.check_tag.outputs.exists == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ steps.get_version.outputs.VERSION }}" -m "Release v${{ steps.get_version.outputs.VERSION }}"
        git push origin "v${{ steps.get_version.outputs.VERSION }}"
        
    - name: Create Release
      if: steps.check_tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        files: |
          release/BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
        body: |
          ## Release v${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          Flash die Firmware mit:
          ```bash
          esptool.py --port /dev/ttyUSB0 write_flash 0x10000 BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
          ```
          
          Oder nutze OTA-Updates über die Web-Oberfläche.
          
          ### Änderungen
          Commit: ${{ github.sha }}AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
        body: |
          ## Release ${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          Flash die Firmware mit:
          ```bash
          esptool.py --port /dev/ttyUSB0 write_flash 0x10000 BK-G4AT2MQTT-${{ steps.get_version.outputs.VERSION }}.bin
          ```
          
          Oder nutze OTA-Updates über die Web-Oberfläche.
          
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
