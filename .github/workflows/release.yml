name: Auto Release on Main Push

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run

      - name: Generate version tag
        id: version
        run: |
          # Generate version based on date and short commit hash
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## BK-G4AT2MQTT Release ${{ steps.version.outputs.version }}
            
            Automatisch erstelltes Release bei Push auf Main Branch.
            
            ### Änderungen
            Commit: ${{ github.sha }}
            
            ### Installation
            1. Firmware-Binary herunterladen
            2. Mit PlatformIO oder esptool.py auf ESP32 flashen
            
            ### Dateien
            - `firmware.bin` - ESP32 Firmware Binary
          draft: false
          prerelease: false

      - name: Upload firmware binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: .pio/build/esp32dev/firmware.bin
          asset_name: firmware.bin
          asset_content_type: application/octet-stream
