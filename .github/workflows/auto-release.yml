name: Auto Release on Push

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run

      - name: Generate version tag
        id: version
        run: |
          # Generate version based on date and short commit hash
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Nightly Build ${{ steps.version.outputs.version }}
          body: |
            ## BK-G4AT2MQTT Nightly Build ${{ steps.version.outputs.version }}
            
            Automatisch erstelltes Release bei Push auf Main Branch.
            
            ### Änderungen
            Commit: ${{ github.sha }}
            
            ### Installation
            1. Firmware-Binary herunterladen
            2. Mit PlatformIO oder esptool.py auf ESP32 flashen
            
            ### Dateien
            - `firmware.bin` - ESP32 Firmware Binary
          files: |
            .pio/build/esp32dev/firmware.bin
          draft: false
          prerelease: true
