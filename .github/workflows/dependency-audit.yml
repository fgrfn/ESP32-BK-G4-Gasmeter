name: Dependency audit

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platformio-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - name: Install pinned dependencies
        run: pio pkg install -e esp32dev
      - name: Report outdated PlatformIO packages
        shell: bash
        run: |
          set +e
          pio pkg outdated -e esp32dev 2>&1 | tee dependency-report.txt
          status=${PIPESTATUS[0]}
          {
            echo "## PlatformIO dependency audit"
            echo
            echo '```text'
            cat dependency-report.txt
            echo '```'
            echo
            echo "Command exit status: ${status}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: platformio-dependency-report
          path: dependency-report.txt
          retention-days: 30
